        /* --- CSS INTEGRATO --- */
        :root {
            --black: #05050a;
            --white: #ffffff;
            --accent: #ff007f;
            --gray: #888;
            --font-hero: 'Syne', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            /* Nascondiamo il cursore di sistema */
            cursor: none; 
        }

        /* CUSTOM CURSOR */
        .cursor {
            width: 8px;
            height: 8px;
            background: var(--white);
            border-radius: 50%;
            position: fixed;
            pointer-events: none; /* Fondamentale: non intercetta i click */
            z-index: 10000;
            transform: translate(-50%, -50%); /* Centra il pallino */
        }

        .cursor-follower {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;

            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%); /* Centra il follower */
        }

        /* LAYOUT */
        .container { padding: 0 10%; }

        header.header {

            top: 0; width: 100%;
            padding: 30px 50px;
            display: flex; justify-content: space-between; align-items: center;

            backdrop-filter: blur(10px);
        }

        .logo { font-family: var(--font-hero); font-weight: 800; font-size: 1.2rem; }
        .nav-links a { color: var(--white); text-decoration: none; margin-left: 30px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }

            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -3px;
        }
