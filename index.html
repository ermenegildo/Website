<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAMIANO MENEGHETTI | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body class="bg-main">

    <div class="cursor-fallback"></div> <header class="header">
        <div class="logo">D.M.</div>
    </header>

    <main>
        <section class="hero">
            <h1 class="hero-title">Translating <span class="thin-text">complexity</span> into clarity.</h1>
            <p class="hero-experience">16 YEARS OF EXPERIENCE IN DESIGN</p>
            <a href="https://www.linkedin.com/in/damianomeneghetti/" target="_blank" class="btn-premium">LinkedIn ↗</a>
        </section>

        <section class="practice-section">
            <h2 class="reveal">My practice merges strategy, interaction design, and cognitive psychology.</h2>
        </section>
    </main>

    <script>
        // Avviamo GSAP solo se la pagina è carica
        window.addEventListener('DOMContentLoaded', () => {
            gsap.registerPlugin(ScrollTrigger);
            
            gsap.from(".hero-title", {
                y: 50,
                opacity: 0,
                duration: 1.5,
                ease: "power4.out"
            });
        });
    </script>
</body>
</html>
